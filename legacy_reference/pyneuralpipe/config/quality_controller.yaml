# 质量控制配置

# Bombcell参数
bombcell:
  # 质量指标阈值
  quality_thresholds:
    firing_rate_min: 0.1        # 最小发放率 (Hz)
    firing_rate_max: 100.0      # 最大发放率 (Hz)
    presence_ratio_min: 0.9     # 最小存在比例
    amplitude_cutoff_max: 0.1   # 最大振幅截断
    isi_violation_max: 0.5      # 最大ISI违规率
    snr_min: 1.5               # 最小信噪比
    
  # 单元分类参数
  classification:
    good_unit_criteria:
      use_firing_rate: true
      use_presence_ratio: true
      use_amplitude_cutoff: true
      use_isi_violation: true
      use_snr: true
    
    mua_criteria:
      max_isi_violation: 2.0
      min_amplitude_cutoff: 0.1
    
  # Bombcell算法参数
  algorithm:
    compute_drift_metrics: true
    compute_noise_metrics: true
    compute_pca_features: true
    n_pca_components: 5
    
# 通道质量评估
channel_quality:
  # 噪声水平阈值
  noise_level_threshold: 50.0   # μV
  
  # 信号范围
  signal_range_min: 10.0        # μV
  signal_range_max: 500.0       # μV
  
  # 伪影检测
  artifact_detection:
    enable: true
    threshold_factor: 5.0       # 标准差倍数
    
# 输出配置
output:
  save_qmetric: true
  save_unit_classification: true
  save_quality_plots: true
  save_channel_map: true
  
  # 文件格式
  formats:
    - 'csv'
    - 'json'
    - 'mat'
