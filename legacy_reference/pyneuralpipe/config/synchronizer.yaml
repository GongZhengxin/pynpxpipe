# 眼动验证参数
eye_tracking:
  threshold: 0.999              # 眼动验证阈值

# 光敏二极管校准参数
photodiode:
  before_onset_measure: 10      # onset前测量窗口(ms)
  after_onset_measure: 50       # onset后测量窗口(ms)
  after_onset_stats: 100        # onset后统计窗口(ms)
  monitor_delay_correction: -5   # 显示器延迟校正(ms, 60Hz)
  threshold_baseline_weight: 0.1 # 基线权重
  threshold_peak_weight: 0.9     # 峰值权重
  highline_detection_window: 20  # 峰值检测窗口(ms)

# 同步验证参数
sync_validation:
  max_time_error: 17.0           # 最大时间误差(ms)


