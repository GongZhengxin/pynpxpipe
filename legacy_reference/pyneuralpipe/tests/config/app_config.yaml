app_name: PyNeuralPipe
version: 1.0.0
debug_mode: false
data_root: ''
output_root: output
temp_dir: temp
log_dir: logs
kilosort:
  n_jobs: 12
  chunk_duration: 4s
  nblocks: 15
  Th_learned: 7.0
  freq_min: 300.0
  freq_max: 6000.0
  artifact_threshold: 0.5
  templates_from_data: true
  nTEMPLATES: 64
  nfullpasses: 6
  dminx: 32.0
  dmin: 2.0
processing:
  bandpass_filter: true
  filter_low: 300.0
  filter_high: 6000.0
  remove_bad_channels: true
  common_reference: true
  min_firing_rate: 0.1
  max_isi_violation: 0.5
  min_amplitude: 50.0
  min_snr: 3.0
  baseline_window: !!python/tuple
  - -0.2
  - 0.0
  response_window: !!python/tuple
  - 0.0
  - 0.5
  bin_size: 0.001
  significance_threshold: 0.05
ui:
  theme: light
  page_title: PyNeuralPipe - 神经数据处理流程
  page_icon: 🧠
  layout: wide
  sidebar_state: expanded
  plot_theme: plotly_white
  figure_width: 800
  figure_height: 600
  color_palette:
  - '#1f77b4'
  - '#ff7f0e'
  - '#2ca02c'
  - '#d62728'
  - '#9467bd'
  - '#8c564b'
  - '#e377c2'
  - '#7f7f7f'
