export:
  derivatives:
    enabled: true
    pre_onset_ms: 50
    post_onset_ms: auto   # number in ms, or "auto" (→ max(VC.onset_time+offset_time))
    bin_size_ms: 1
    n_jobs: 1
curation:
  # Fallback path (use_bombcell=False) thresholds. Ignored when
  # use_bombcell=True — see curation.bombcell below.
  use_bombcell: true
  amplitude_cutoff_max: 0.5
  isi_violation_ratio_max: 2.0
  presence_ratio_min: 0.5
  snr_min: 0.3
  good_isi_max: 0.1
  good_snr_min: 3.0
  # Bombcell main-path thresholds (use_bombcell=true). Values below override
  # the mua layer of SI's bombcell_get_default_thresholds() and align with
  # MATLAB bc_qualityParamValues — wider than SI built-ins, which
  # empirically produced too few SUA. Set extra_overrides to reach noise /
  # non-somatic layers without editing this file's schema.
  bombcell:
    amplitude_median_min: 20.0      # µV; SI default 30
    num_spikes_min: 50              # SI default 300
    presence_ratio_min: 0.2         # SI default 0.7
    snr_min: 3.0                    # SI default 5
    amplitude_cutoff_max: 0.2
    rp_contamination_max: 0.1
    drift_ptp_max: 100.0            # µm
    label_non_somatic: true
    split_non_somatic_good_mua: false
    extra_overrides: {}
parallel:
  enabled: false
  max_workers: auto
preprocess:
  # Preprocessed Zarr dtype. "int16" halves disk vs "float32" (motion correction
  # makes the chain float32) at ~0.5-ADC-count (sub-µV) cost — below the AP noise
  # floor, invisible to KS4 (re-whitens), gain_to_uV preserved so µV stays exact.
  save_dtype: int16
  # Delete each probe's preprocessed Zarr once its postprocess checkpoint is
  # written (the Zarr's last consumer), freeing disk before the export NWB.
  # Re-running a pre-postprocess stage afterward needs a re-preprocess.
  delete_zarr_after_postprocess: true
  bad_channel_detection:
    dead_channel_threshold: 0.5
    method: coherence+psd
  bandpass:
    freq_max: 6000
    freq_min: 300
  common_reference:
    operator: median
    reference: global
  motion_correction:
    method: dredge
    preset: dredge
    bin_s: 1.0
    # DREDge memory advisor (see docs/specs/motion_memory_advisor.md): for
    # recordings > probe_threshold_s, predict the (B, T, T) correlation-matrix
    # memory and either raise bin_s to the highest precision that fits RAM, or
    # disable DREDge and fall back to Kilosort4 nblocks.
    auto_strategy: true
    bin_s_floor: 1.0
    bin_s_max: 3.0
    ram_safety_factor: 0.6
    overhead_reserve_gb: 16.0
    bytes_per_entry: 4
    n_matrices: 4
    win_step_um: 400.0
    n_windows: null
    probe_threshold_s: 7200.0
    fallback_nblocks: 5
resources:
  chunk_duration: auto
  max_memory: auto
  n_jobs: auto
  # --- Utilization tuning: how aggressively auto-detection uses THIS machine ---
  # Defaults target ~90% of CPU + GPU while keeping a hard RAM safety margin.
  # AP preprocessing is CPU/IO-bound (each worker holds one chunk ≈ 1.15GB), so
  # cores + GPU batch_size — not RAM — are the throughput levers. Lower the
  # factors / caps on a shared machine; raise reserve_cores if the box must stay
  # responsive during a run.
  reserve_cores: 1            # physical cores left free for OS/orchestrator
  n_jobs_cap: 64              # hard ceiling on parallel chunk workers
  ram_safety_factor: 0.85     # fraction of *available* RAM as the n_jobs budget
  ram_reserve_gb: 10.0        # absolute RAM headroom always kept free
  chunk_ram_fraction: 0.40    # fraction of available RAM for chunk sizing
  chunk_max_s: 5.0            # largest chunk_duration auto will pick (s)
  max_workers_cap: 8          # hard ceiling on parallel-probe workers
  max_workers_ram_fraction: 0.85
  vram_safety_factor: 0.90    # fraction of (free VRAM − overhead) for KS4 batch_size
  vram_overhead_gb: 2.0
sync:
  event_bits:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  generate_plots: true
  max_time_error_ms: 17.0
  monitor_delay_ms: -5.0
  photodiode_channel_index: 0
  stim_onset_code: 64
  stim_onset_bit: null  # null = auto-detect (decoded-domain bit, NOT raw ML bit)
  nidq_sync_bit: 0
  imec_sync_bit: 6
  trial_count_tolerance: 2
  stim_count_tolerance: 0
