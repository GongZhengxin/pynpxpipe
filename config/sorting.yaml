# ============================================================
# pynpxpipe Sorting Configuration
# ============================================================

# Sorting mode: "local" (run sorter here) or "import" (load external results)
mode: "local"

# Local run parameters (used when mode: local)
sorter:
  name: "kilosort4"
  params:
    nblocks: 0                   # Drift correction blocks (0 = no drift correction)
    # Four KS4 params below are explicitly pinned to prevent library-default regression
    # (KS4 >=4.1.3 silently changed cluster_downsampling 1->20). See docs/todo.md §IV.8.
    Th_learned: 8.0              # KS4 default; matches reference pipeline
    Th_universal: 9.0            # KS4 default; explicit pin
    cluster_downsampling: 1      # Match reference pipeline (KS4 4.1.0-4.1.2 default; OOM risk on large sessions)
    max_cluster_subset: 25000    # Explicit pin guards against future default changes
    do_CAR: false                # KS internal CAR (disable: preprocessing already did CMR)
    batch_size: auto             # "auto" or integer; auto = ResourceDetector recommends based on free VRAM
    n_jobs: 1                    # KS internal parallelism (typically 1 for GPU)
    torch_device: auto           # "cuda" | "cpu" | "auto" (auto = CUDA if available)

# Import parameters (used when mode: import)
import:
  format: "kilosort4"            # "kilosort4" | "phy"
  # Per-probe import paths can be specified here or via CLI --import-path flag:
  # paths:
  #   imec0: "C:/kilosort_output/session_20260101/imec0"
  #   imec1: "C:/kilosort_output/session_20260101/imec1"

# SortingAnalyzer postprocessing (postprocess stage)
analyzer:
  random_spikes:
    max_spikes_per_unit: 500     # Max spikes sampled per unit (controls memory)
    method: "uniform"
  waveforms:
    ms_before: 1.0               # Pre-spike window (ms)
    ms_after: 2.0                # Post-spike window (ms)
  templates:
    operators: ["average", "std"]
  unit_locations:
    method: "monopolar_triangulation"
  template_similarity:
    method: "cosine_similarity"
